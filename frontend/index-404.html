<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111, #222);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin: 0.2rem;
    }

    p {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 560px;
      aspect-ratio: 16 / 9;
      margin-top: 1rem;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      p { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <h1>404, not found in the system</h1>
  <h1>404, the new era, era</h1>
  <p>Oops! Page not found… but you can still jam to some K-Pop 🎵</p>

  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/zhHB4dZTChw"
      title="404 (New Era) by KiiKiii"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
