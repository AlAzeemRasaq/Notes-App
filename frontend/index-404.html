<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111, #222);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 6rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }

    a.button {
      display: inline-block;
      padding: 1rem 2rem;
      background: #ff4081;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    a.button:hover {
      background: #e73370;
    }

    @media (max-width: 600px) {
      h1 { font-size: 4rem; }
      p { font-size: 1.2rem; }
      a.button { padding: 0.8rem 1.6rem; }
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Oops! Page not found… but you can still jam to some K-Pop 🎵</p>

  <!-- Must-use clickable link -->
  <a class="button" href="https://www.youtube.com/watch?v=zhHB4dZTChw" target="_blank">
    Play "404 (New Era)" by KiiKiii
  </a>
</body>
</html>
