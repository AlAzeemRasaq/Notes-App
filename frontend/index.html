<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <aside class="sidebar">
        <h2>Notes</h2>
        <nav>
            <a href="index.html">All Notes</a>
            <a href="index-archive.html">Archived</a>
            <a href="#">Trash</a>
        </nav>
    </aside>

    <div class="main-container">

        <header class="topbar">
            <input id="searchInput" type="text" placeholder="Search notes...">
            <div class="auth-buttons">
                <button onclick="toggleTheme()">🌗</button>
                <button id="loginBtn">Login</button>
                <button id="registerBtn">Sign Up</button>
                <button id="logoutBtn" class="hidden">Logout</button>
            </div>
        </header>

        <div class="create-note">
            <input type="text" id="noteTitle" placeholder="Title">

            <div class="toolbar">
                <button onclick="formatText('bold')"><b>B</b></button>
                <button onclick="formatText('italic')"><i>I</i></button>
                <button onclick="formatText('underline')"><u>U</u></button>
                <button onclick="formatText('createLink')">Link</button>
                <button onclick="triggerImageUpload()">Image</button>
                <button onclick="insertEmbed()">Embed</button>
            </div>

            <div id="noteContent" class="rich-editor" contenteditable="true"></div>

            <input type="file" id="imageUploader" style="display:none">

            <button id="addNoteBtn">Add Note</button>
        </div>

        <div id="notesContainer" class="notes-grid"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
