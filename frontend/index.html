<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Notes</h2>
        <nav>
            <a href="index.html">All Notes</a>
            <a href="index-archive.html">Archived</a>
            <a href="index-trash.html">Trash</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Top Bar -->
        <header class="topbar">
            <input id="searchInput" type="text" placeholder="Search notes...">
            <div class="auth-buttons">
                <button onclick="toggleTheme()">🌗</button>
                <button id="loginBtn">Login</button>
                <button id="registerBtn">Sign Up</button>
                <button id="logoutBtn" class="hidden">Logout</button>
            </div>
        </header>

        <!-- Create Note -->
        <div class="create-note">
            <input type="text" id="noteTitle" placeholder="Title">

            <!-- Toolbar -->
            <div class="toolbar">
                <button onclick="formatText('bold')"><b>B</b></button>
                <button onclick="formatText('italic')"><i>I</i></button>
                <button onclick="formatText('underline')"><u>U</u></button>
                <button onclick="formatText('createLink')">Link</button>
                <button onclick="triggerImageUpload()">Image</button>
                <button onclick="insertEmbed()">Embed</button>
            </div>

            <!-- Rich Text Editor -->
            <div id="noteContent" class="rich-editor" contenteditable="true" placeholder="Take a note..."></div>

            <!-- Hidden Image Uploader -->
            <input type="file" id="imageUploader" accept="image/*" style="display:none">
            
            <!-- 🎨 Color Picker -->
            <div class="color-picker">
                <span class="color-option default" data-color="default"></span>
                <span class="color-option red" data-color="red"></span>
                <span class="color-option orange" data-color="orange"></span>
                <span class="color-option yellow" data-color="yellow"></span>
                <span class="color-option green" data-color="green"></span>
                <span class="color-option cyan" data-color="cyan"></span>
                <span class="color-option blue" data-color="blue"></span>
                <span class="color-option indigo" data-color="indigo"></span>
                <span class="color-option violet" data-color="violet"></span>
                <span class="color-option purple" data-color="purple"></span>
                <span class="color-option pink" data-color="pink"></span>
            </div>
            
            <button id="addNoteBtn">Add Note</button>
        </div>

        <!-- 🔥 SELECT MODE BUTTON -->
        <div class="bulk-actions">
            <button id="selectModeBtn">Select</button>

            <div id="bulkOptions" style="display:none; margin-top:10px;">
                <input type="checkbox" id="selectAllNotes"> Select All
                <button id="bulkDelete">Delete Selected</button>
                <button id="bulkArchive">Archive Selected</button>
                <button id="cancelSelectBtn">Cancel</button>
            </div>
        </div>

        <!-- Notes Grid -->
        <div id="notesContainer" class="notes-grid"></div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <!-- Rich Text + Drag & Drop -->
    <script>
        function formatText(command) {
            if (command === 'createLink') {
                const url = prompt('Enter the URL');
                if (url) document.execCommand(command, false, url.startsWith('http') ? url : 'https://' + url);
            } else {
                document.execCommand(command, false, null);
            }
        }

        function triggerImageUpload() { document.getElementById('imageUploader').click(); }

        document.getElementById('imageUploader').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                document.getElementById('noteContent').appendChild(img);
            };
            reader.readAsDataURL(file);
        });

        function insertEmbed() {
            const embedCode = prompt('Paste embed HTML (iframe)');
            if (!embedCode) return;
            const parser = new DOMParser();
            const doc = parser.parseFromString(embedCode, 'text/html');
            const iframe = doc.querySelector('iframe');
            if (iframe) document.getElementById('noteContent').appendChild(iframe);
            else alert('Invalid embed code');
        }

        const editor = document.getElementById('noteContent');
        editor.addEventListener('dragover', e => e.preventDefault());
        editor.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                editor.appendChild(img);
            };
            reader.readAsDataURL(file);
        });

        editor.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let i=0;i<items.length;i++){
                if(!items[i].type.startsWith('image/')) continue;
                const file = items[i].getAsFile();
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    editor.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
