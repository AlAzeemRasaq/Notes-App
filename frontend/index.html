<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- ================= Sidebar ================= -->
    <aside class="sidebar">
        <h2>Notes</h2>

        <!-- Navigation (future functionality) -->
        <nav>
            <a href="#">All Notes</a>
            <a href="#">Archived</a>
            <a href="#">Trash</a>
        </nav>
    </aside>


    <!-- ================= Main Content ================= -->
    <div class="main-container">

        <!-- ================= Top Bar ================= -->
        <header class="topbar">

            <!-- Search (not implemented yet) -->
            <input type="text" placeholder="Search notes...">

            <!-- Authentication Buttons -->
            <div class="auth-buttons">

                <!-- Visible when logged out -->
                <button id="loginBtn">Login</button>
                <button id="registerBtn">Sign Up</button>

                <!-- Visible when logged in -->
                <button id="logoutBtn" class="hidden">Logout</button>

            </div>

        </header>


        <!-- ================= Create Note ================= -->
        <div class="create-note">

            <!-- Title input -->
            <input type="text" id="noteTitle" placeholder="Title">

            <!-- Rich text toolbar -->
            <div class="toolbar">
                <button type="button" onclick="formatText('bold')"><b>B</b></button>
                <button type="button" onclick="formatText('italic')"><i>I</i></button>
                <button type="button" onclick="formatText('underline')"><u>U</u></button>
                <button type="button" onclick="formatText('createLink')">Link</button>
                <button type="button" onclick="insertImage()">Image</button>
                <button type="button" onclick="insertEmbed()">Embed</button>
            </div>

            <!-- Rich text editor -->
            <div id="noteContent" class="rich-editor" contenteditable="true" placeholder="Take a note..."></div>

            <!-- Button that triggers note creation -->
            <button id="addNoteBtn">
                Add Note
            </button>

        </div>

        <!-- ================= Notes Grid ================= -->
        <!-- Notes loaded from MongoDB will appear here -->
        <div
            id="notesContainer"
            class="notes-grid"
        ></div>

    </div>


<!-- ================= Scripts ================= -->

<!-- Handles API calls -->
<script src="js/api.js"></script>

<!-- Handles login/logout -->
<script src="js/auth.js"></script>

<!-- Handles notes CRUD -->
<script src="js/main.js"></script>

<script>
    // ================= Rich Text Functions =================
    function formatText(command) {
        if(command === 'createLink') {
            const url = prompt('Enter the URL');
            if(url) document.execCommand(command, false, url);
        } else {
            document.execCommand(command, false, null);
        }
    }

    function insertImage() {
        const url = prompt('Enter image URL');
        if(url) document.execCommand('insertImage', false, url);
    }

    function insertEmbed() {
        const embedCode = prompt('Paste embed HTML (like iframe)');
        if(embedCode) {
            const editor = document.getElementById('noteContent');
            editor.innerHTML += embedCode;
        }
    }
</script>

</body>
</html>
