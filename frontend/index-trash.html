<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trash</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <aside class="sidebar">
        <h2>Notes</h2>
        <nav>
            <a href="index.html">All Notes</a>
            <a href="index-archive.html">Archived</a>
            <a href="index-trash.html">Trash</a>
        </nav>
    </aside>

    <div class="main-container">

        <header class="topbar">
            <input id="searchInput" type="text" placeholder="Search trashed notes...">
            <button onclick="toggleTheme()">🌗</button>
        </header>

        <h2 style="margin-bottom: 20px;">🗑️ Trash</h2>

        <div id="notesContainer" class="notes-grid"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Override loadNotes behavior for trash page
        async function loadNotes() {
            let notes = await apiRequest("/notes");

            // ✅ ONLY trashed notes
            notes = notes.filter(n => n.trashed);

            renderNotes(notes);
        }

        loadNotes();
    </script>

</body>
</html>
