<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trash</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="trash">
    <aside class="sidebar">
        <h2>Notes</h2>
        <nav>
            <a href="index.html">All Notes</a>
            <a href="index-archive.html">Archived</a>
            <a href="index-trash.html">Trash</a>
        </nav>
    </aside>

    <!-- ☰ MOBILE MENU BUTTON -->
    <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>

    <div class="main-container">

        <header class="topbar">
            <input id="searchInput" type="text" placeholder="Search trashed notes...">
            <button onclick="toggleTheme()">🌗</button>
        </header>

        <h2 style="margin-bottom: 20px;">🗑️ Trash</h2>
        <button onclick="emptyTrash()" class="danger-btn">
            🧨 Empty Trash
        </button>

        <div id="notesContainer" class="notes-grid"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>

    <script>
        // 🔥 Tell main.js this is the trash page
        window.isTrashPage = true;

        // 🔥 Load only trashed notes
        async function loadNotes() {
            let notes = await apiRequest("/notes/trash");
            allNotes = notes; // update global state
            applyFilters();   // apply search/tag filters if any
        }

        // 🔥 Trash-specific functions
        async function restoreNote(id) {
            await apiRequest(`/notes/restore/${id}`, "PUT");
            await loadNotes();
        }

        async function permanentDelete(id) {
            if (!confirm("Permanently delete this note?")) return;
            await apiRequest(`/notes/permanent/${id}`, "DELETE");
            await loadNotes();
        }

        loadNotes();
    </script>

</body>
</html>
